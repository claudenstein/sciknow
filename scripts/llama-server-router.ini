# Phase 55.V2 prototype — llama-server router-mode preset config.
#
# Native router mode lands the same outcome as our hand-rolled
# `_VRAM_CONFLICTS` machinery: one llama-server process serves every
# named model, with built-in LRU eviction at `--models-max`. Migrating
# collapses 5 ports → 1 and replaces ~250 lines of swap logic with
# llama.cpp's native scheduler.
#
# Usage:
#   /path/to/llama-server \
#     --models-preset scripts/llama-server-router.ini \
#     --models-max 2 \
#     --port 8090 --host 127.0.0.1 \
#     -ngl 999
#
# The `model` field in /v1/chat/completions selects the loaded GGUF
# by section name (e.g. `"model": "writer"` or `"model": "scorer"`).
# The router LRU-evicts when adding a model would exceed --models-max.
#
# Phase 55.V2 status: prototype. Migration is deferred until the
# router has been benchmarked against the current substrate for:
#   1. embedding endpoint (`/embedding`) — does it work in router mode?
#   2. reranking endpoint (`/rerank`) — same question.
#   3. concurrent-call behaviour — autowrite issues 1 writer + 1 scorer
#      sequentially per iteration; does the router serialise correctly?
#   4. KV-cache continuity across model swaps (probably zero — each
#      model swap drops the prefix cache; verify this matches our
#      manual-swap behaviour).
#
# Migration order (when ready):
#   1. Ship router-mode config alongside the existing per-role processes.
#   2. Add a `USE_LLAMACPP_ROUTER=true` toggle in config.py that flips
#      `infer/server.py` to point all `_resolve_url` lookups at the
#      single router URL.
#   3. Migrate `_VRAM_CONFLICTS` + `activate_phase` to no-ops when the
#      toggle is on (the router handles eviction natively).
#   4. Audit `pause_for_ingest` and `caption-visuals` hot-swap helpers
#      — they may need to translate to router /models/load + /unload
#      calls.

