# Phase 54.6.209 — roadmap 3.7.1: rule-based entity canonicalization
# for the knowledge graph.
#
# The LLM-based `db extract-kg` pass emits entity names verbatim from
# each source sentence, which is great for fidelity but disastrous for
# recall: "CO2", "CO₂", "carbon dioxide", "Carbon Dioxide" all land as
# separate rows in `knowledge_graph`. This alias file collapses them
# onto a canonical form BEFORE insert.
#
# Format: top-level keys are the *canonical* form (lowercased). Values
# are lists of additional spellings / synonyms / abbreviations to map
# onto that canonical form. Matching is case-insensitive AFTER the
# incoming name is lowercased + light-normalized (whitespace
# collapsed, trailing punctuation stripped).
#
# Pre-existing `knowledge_graph` rows are NOT migrated by the insert-
# time canonicalizer. Run `sciknow wiki compile --rebuild` to re-
# extract triples through the new mapping, OR run a one-off backfill
# query (see docs/roadmap/ROADMAP_INGESTION.md §3.7.1 notes).
#
# Contributions: this file is intentionally editable in-repo. Add
# aliases when you see duplicate-looking entities in the KG UI; the
# next `wiki compile --rebuild` picks them up. Keep the canonical
# form lowercase + unicode-normalized so the file survives an ASCII
# round-trip.

